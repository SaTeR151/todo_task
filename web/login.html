<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <script>
      (() => {
        let theme = "light";
        try {
          theme = localStorage.getItem("todo_task.theme") === "dark" ? "dark" : "light";
        } catch {}
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="stylesheet" href="/css/style.css">
    <title>Вход - Планировщик задач</title>
  </head>
  <body data-page="login">
    <main class="auth-page">
      <section class="auth-card">
        <h1>Вход</h1>
        <p>Откройте свои доски и продолжите работу с задачами.</p>
        <div class="alert" data-alert></div>
        <form class="form-grid" id="login-form">
          <label class="field">
            <span>Логин</span>
            <input class="input" name="login" autocomplete="username" maxlength="10" required>
          </label>
          <label class="field">
            <span>Пароль</span>
            <input class="input" name="password" type="password" autocomplete="current-password" maxlength="30" required>
          </label>
          <button class="button symbol-button" type="submit" aria-label="Войти" title="Войти">
            <span aria-hidden="true">&gt;</span>
          </button>
        </form>
        <p>Нет аккаунта? <a class="link-button" href="/register">Зарегистрироваться</a></p>
      </section>
    </main>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
