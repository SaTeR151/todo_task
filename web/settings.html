<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <script>
      (() => {
        let theme = "light";
        try {
          theme = localStorage.getItem("todo_task.theme") === "dark" ? "dark" : "light";
        } catch {}
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="stylesheet" href="/css/style.css">
    <title>Настройки - Планировщик задач</title>
  </head>
  <body data-page="settings">
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/home">
          <span class="brand-mark">T</span>
          <span>Планировщик задач</span>
        </a>
        <nav class="nav">
          <a class="ghost-button" href="/home">Кабинет</a>
          <button class="danger-button" type="button" data-logout>Выйти</button>
        </nav>
      </header>
      <main class="content">
        <section class="page-title">
          <div>
            <h1>Настройки</h1>
            <p id="settings-caption">Управление аккаунтом.</p>
          </div>
        </section>
        <div class="alert" data-alert></div>
        <section class="panel">
          <div class="panel-header">
            <div>
              <h2>Смена пароля</h2>
              <p class="panel-subtitle">Новый пароль должен отличаться от текущего.</p>
            </div>
          </div>
          <form class="form-grid" id="password-form">
            <label class="field">
              <span>Текущий пароль</span>
              <input class="input" name="old_password" type="password" autocomplete="current-password" maxlength="30" required>
            </label>
            <label class="field">
              <span>Новый пароль</span>
              <input class="input" name="new_password" type="password" autocomplete="new-password" maxlength="30" required>
            </label>
            <button class="button symbol-button" type="submit" aria-label="Сохранить пароль" title="Сохранить пароль">
              <span aria-hidden="true">✓</span>
            </button>
          </form>
        </section>
      </main>
    </div>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
