<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <script>
      (() => {
        let theme = "light";
        try {
          theme = localStorage.getItem("todo_task.theme") === "dark" ? "dark" : "light";
        } catch {}
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="stylesheet" href="/css/style.css">
    <title>Доска - Планировщик задач</title>
  </head>
  <body data-page="board">
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/home">
          <span class="brand-mark">T</span>
          <span>Планировщик задач</span>
        </a>
        <nav class="nav">
          <a class="ghost-button" href="/home">Кабинет</a>
          <button class="danger-button" type="button" data-logout>Выйти</button>
        </nav>
      </header>
      <main class="content board-content">
        <section class="page-title board-titlebar">
          <div class="board-title-stack">
            <h1 id="board-title">Доска</h1>
            <p id="board-caption">Канбан по колонкам.</p>
            <div class="segmented-control" aria-label="Режим отображения доски">
              <a class="segmented-option is-active" id="board-kanban-switch" href="/home">Канбан</a>
              <a class="segmented-option" id="board-overview-switch" href="/home">Обзор</a>
            </div>
          </div>
          <div class="board-actions">
            <button class="ghost-button symbol-button hidden" id="column-create-toggle" type="button" aria-label="Создать колонку" title="Создать колонку">
              <span aria-hidden="true">+</span>
            </button>
            <button class="icon-button" id="board-edit-toggle" type="button" aria-label="Включить редактирование" aria-pressed="false" title="Включить редактирование">
              <span aria-hidden="true">✎</span>
            </button>
          </div>
        </section>
        <div class="alert" data-alert></div>
        <section class="kanban" id="kanban"></section>
      </main>
    </div>
    <div class="modal-backdrop hidden" id="task-modal" role="dialog" aria-modal="true" aria-labelledby="task-modal-title">
      <div class="modal">
        <div class="modal-header">
          <div>
            <h2 id="task-modal-title">Новая задача</h2>
            <p id="task-modal-subtitle"></p>
          </div>
          <button class="icon-button is-danger" type="button" data-modal-close aria-label="Закрыть" title="Закрыть">
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <form class="form-grid" id="task-modal-form">
          <label class="field">
            <span>Название</span>
            <input class="input" name="label" maxlength="50" required>
          </label>
          <label class="field">
            <span>Описание</span>
            <textarea class="textarea" name="description" maxlength="300"></textarea>
          </label>
          <label class="field">
            <span>Тип</span>
            <select class="select" name="type_id"></select>
          </label>
          <label class="field">
            <span>Колонка</span>
            <select class="select" name="column_id"></select>
          </label>
          <div class="modal-actions">
            <button class="danger-button symbol-button hidden" id="task-modal-delete" type="button" aria-label="Удалить задачу" title="Удалить задачу">
              <span aria-hidden="true">X</span>
            </button>
            <span class="modal-actions-spacer"></span>
            <button class="ghost-button symbol-button" id="task-modal-cancel" type="button" data-modal-close aria-label="Отмена" title="Отмена">
              <span aria-hidden="true">←</span>
            </button>
            <button class="button symbol-button" id="task-modal-submit" type="submit" aria-label="Создать задачу" title="Создать задачу">
              <span aria-hidden="true">✓</span>
            </button>
          </div>
        </form>
      </div>
    </div>
    <div class="modal-backdrop hidden" id="column-modal" role="dialog" aria-modal="true" aria-labelledby="column-modal-title">
      <div class="modal">
        <div class="modal-header">
          <div>
            <h2 id="column-modal-title">Новая колонка</h2>
            <p id="column-modal-subtitle">Колонки отображаются слева направо по порядку.</p>
          </div>
          <button class="icon-button is-danger" type="button" data-modal-close aria-label="Закрыть" title="Закрыть">
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <form class="form-grid" id="column-modal-form">
          <label class="field">
            <span>Название</span>
            <input class="input" name="name" maxlength="50" required>
          </label>
          <label class="field">
            <span>Порядок</span>
            <input class="input" name="order_number" type="number" min="1" required>
          </label>
          <div class="modal-actions">
            <button class="danger-button symbol-button hidden" id="column-modal-delete" type="button" aria-label="Удалить колонку" title="Удалить колонку">
              <span aria-hidden="true">X</span>
            </button>
            <span class="modal-actions-spacer"></span>
            <button class="ghost-button symbol-button" type="button" data-modal-close aria-label="Отмена" title="Отмена">
              <span aria-hidden="true">←</span>
            </button>
            <button class="button symbol-button" id="column-modal-submit" type="submit" aria-label="Сохранить колонку" title="Сохранить колонку">
              <span aria-hidden="true">✓</span>
            </button>
          </div>
        </form>
      </div>
    </div>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
